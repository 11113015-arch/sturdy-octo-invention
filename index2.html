<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式網頁程式設計 - 待辦事項實作</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="todo-container">
        <h1>待辦事項</h1>
        
        <input type="text" id="todo-input" placeholder="請輸入提醒事項">
        
        <input type="datetime-local" id="todo-time">
        
        <button onclick="addTodo()">確定新增</button>
        
        <ul id="todo-list"></ul>
    </div>
</body>
</html>
